version: "3.9"

services:
  # ── Ollama (Local LLM) ──────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: veritas_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: veritas_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Neo4j Community ──────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: veritas_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/veritas123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-O", "-", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Backend (FastAPI) ────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: veritas_backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=veritas123
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.1:8b
      - CHROMA_PERSIST_DIR=/app/data/chromadb
      - UPLOAD_DIR=/app/data/uploads
      - JWT_SECRET_KEY=change-me-jwt-secret
      - APP_ENV=production
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ── Frontend (Next.js) ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: veritas_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  # ── Ollama Model Puller ──────────────────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: veritas_ollama_init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "ollama pull llama3.1:8b"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

volumes:
  ollama_data:
  redis_data:
  neo4j_data:
  neo4j_logs:

networks:
  default:
    name: veritas_network
